name: Feature request
description: Suggest a new resilience pattern, API, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are trying to solve and how a change to Resilient would help.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or pain point does this address?
      placeholder: "I'm trying to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like to see.
      render: kotlin
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or libraries you evaluated.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This affects the public API (`shared` module)
        - label: Documentation update would be needed (`docs/patterns/` or README)
        - label: This is a breaking change
